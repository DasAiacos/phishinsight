services:

  backend:
    build:
      context: ./Backend
    container_name: phishinsight-backend
    ports:
      - "8000:8000"
    volumes:
      - sqlite_data:/app/data

  frontend:
    build:
      context: ./Frontend
    container_name: phishinsight-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  sqlite_data: